name: Structure Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required folders
        run: |
          test -d docs/runbooks
          test -d docs/postmortems
          test -d docs/standards

      - name: Check required files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f docs/standards/documentation-standard.md
